name: Deploy site (gh-pages branch)

# Alternativa mais simples: publica na branch gh-pages.
# Em Settings → Pages → Source: Deploy from a branch → gh-pages → / (root)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bundle markdown into JS
        run: python3 scripts/bundle_content.py

      - name: Build static site folder
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html _site/
          touch _site/.nojekyll
          cp -r site _site/site
          cp -r concurso-assistente-informatica _site/concurso-assistente-informatica

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
          enable_jekyll: false
