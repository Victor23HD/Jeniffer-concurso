name: Deploy GitHub Pages (Actions)

# Só roda manualmente. O deploy automático usa a branch gh-pages
# (workflow "Deploy site (gh-pages branch)").
#
# Se quiser este modo: Settings → Pages → Source = GitHub Actions,
# depois Actions → este workflow → Run workflow.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bundle markdown into JS
        run: python3 scripts/bundle_content.py

      - name: Build static site folder
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html _site/
          touch _site/.nojekyll
          cp -r site _site/site
          cp -r concurso-assistente-informatica _site/concurso-assistente-informatica

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
